<!--Layout de com um cabeçalho, tres colunas e um rodapé-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template CSS Layout com tres colunas</title>
    <link rel="stylesheet" href="/exemplo 03/css/main.css">
    
</head>
<body>
    <header class="header">
        <h1 class="header">Header</h1>
    </header>
    <h2>CSS com Float</h2>

    <p>Redimensione a janela do navegador para visualizar o efeito responsivo na pagina</p>
    <div class="row">
        <div class="column" style="background-color: #aaa;">Coluna</div>
        <div class="column" style="background-color: #bbb;">Coluna</div>

    </div>
</body>

</html>
